name: FixFlow CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  backend-frontend-testing:
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 4
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14", "3.15"]

    steps:
    - uses: actions/checkout@v4

    - name: test backend
      env:
        DB_HOST: "localhost"
        DB_PORT: "3306"
        DB_NAME: "dummy_db"
        DB_USER: "dummy_user"
        DB_PASS: "dummy_password"
        SECRET_KEY: "dummy_key"
      run: |
        apt-get update
        apt-get install -y python3 python3-pip python3-venv python3-dev build-essential pkg-config default-libmysqlclient-dev curl
        curl -o- https://raw.githubusercontent.com/nvm-sh/nvm/v0.40.4/install.sh | bash
        \. "$HOME/.nvm/nvm.sh"
        nvm install 24
        ################
        python3 -m venv venv
        source venv/bin/activate
        pip install --upgrade pip
        cd backend
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        python manage.py test
        #######
        cd ..
        #######
        cd FrontEnd
        npm install
        npm run test
